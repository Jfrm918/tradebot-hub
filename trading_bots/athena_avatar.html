<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHENA — AI FAMILIAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000005;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            color: #00d4ff;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ── ATMOSPHERIC BG ── */
        .atmosphere {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background:
                radial-gradient(ellipse 60% 80% at 50% 100%, rgba(80,0,180,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 50% 0%, rgba(0,30,80,0.3) 0%, transparent 60%);
        }

        /* Scanline overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,212,255,0.015) 2px,
                rgba(0,212,255,0.015) 4px
            );
        }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,10,0.8) 0%, transparent 100%);
        }

        .athena-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.4em;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            text-shadow:
                0 0 10px #00d4ff,
                0 0 30px rgba(0,212,255,0.5),
                0 0 60px rgba(0,212,255,0.2);
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%,100% { text-shadow: 0 0 10px #00d4ff, 0 0 30px rgba(0,212,255,0.5); }
            50%      { text-shadow: 0 0 20px #00d4ff, 0 0 60px rgba(0,212,255,0.8), 0 0 100px rgba(0,212,255,0.3); }
        }

        .status-cluster {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-pill {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status-online {
            background: rgba(0,255,157,0.1);
            border: 1px solid rgba(0,255,157,0.4);
            color: #00ff9d;
            box-shadow: 0 0 16px rgba(0,255,157,0.2);
        }

        .status-listening {
            background: rgba(255,107,0,0.1);
            border: 1px solid rgba(255,107,0,0.4);
            color: #ff6b00;
            box-shadow: 0 0 16px rgba(255,107,0,0.2);
            display: none;
        }

        .status-thinking {
            background: rgba(150,0,255,0.1);
            border: 1px solid rgba(150,0,255,0.4);
            color: #9600ff;
            box-shadow: 0 0 16px rgba(150,0,255,0.2);
            display: none;
        }

        /* ── NAME PLATE ── */
        .nameplate {
            position: fixed;
            bottom: 280px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .nameplate-name {
            font-family: 'Orbitron', monospace;
            font-size: 2.2em;
            font-weight: 900;
            color: #fff;
            letter-spacing: 12px;
            text-shadow:
                0 0 20px #00d4ff,
                0 0 50px rgba(0,212,255,0.6);
        }

        .nameplate-sub {
            font-size: 0.72em;
            color: rgba(0,212,255,0.5);
            letter-spacing: 4px;
            margin-top: 4px;
        }

        /* ── SPEECH DISPLAY ── */
        .speech-container {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 700px;
            max-width: 90vw;
            text-align: center;
        }

        .speech-bubble {
            background: rgba(0,5,20,0.85);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 16px 24px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 40px rgba(0,212,255,0.08),
                inset 0 1px 0 rgba(0,212,255,0.1);
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
        }

        #speechText {
            font-size: 0.95em;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #00d4ff;
            margin-left: 4px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* ── MIC BUTTON ── */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .mic-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(0,212,255,0.4);
            background: rgba(0,10,40,0.8);
            color: #00d4ff;
            cursor: pointer;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow:
                0 0 20px rgba(0,212,255,0.15),
                inset 0 0 20px rgba(0,212,255,0.05);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .mic-btn:hover {
            border-color: rgba(0,212,255,0.8);
            box-shadow: 0 0 40px rgba(0,212,255,0.4);
            transform: scale(1.05);
        }

        .mic-btn.listening {
            border-color: rgba(255,107,0,0.8);
            box-shadow: 0 0 40px rgba(255,107,0,0.5);
            animation: micPulse 1s ease-in-out infinite;
        }

        @keyframes micPulse {
            0%,100% { box-shadow: 0 0 30px rgba(255,107,0,0.4); }
            50%      { box-shadow: 0 0 60px rgba(255,107,0,0.8); }
        }

        .mic-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0,212,255,0.2);
            animation: ringExpand 2s ease-out infinite;
            display: none;
        }

        .mic-btn.listening .mic-ring {
            display: block;
            border-color: rgba(255,107,0,0.4);
        }

        @keyframes ringExpand {
            0%   { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .hint-text {
            font-size: 0.7em;
            color: rgba(0,212,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── ENERGY BARS ── */
        .energy-left, .energy-right {
            position: fixed;
            top: 20%;
            bottom: 20%;
            width: 3px;
            z-index: 5;
        }

        .energy-left { left: 32px; }
        .energy-right { right: 32px; }

        .energy-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(0,212,255,0.1) 20%,
                rgba(0,212,255,0.4) 50%,
                rgba(0,212,255,0.1) 80%,
                transparent 100%
            );
            position: relative;
            overflow: hidden;
        }

        .energy-bar::after {
            content: '';
            position: absolute;
            top: -20%;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, transparent, rgba(0,212,255,0.8), transparent);
            animation: energyFlow 3s ease-in-out infinite;
        }

        .energy-right .energy-bar::after {
            animation-delay: 1.5s;
        }

        @keyframes energyFlow {
            0%   { top: -40%; }
            100% { top: 100%; }
        }

        /* ── CORNER DECORATIONS ── */
        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            z-index: 5;
        }

        .corner-tl { top: 16px; left: 16px; border-top: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3); }
        .corner-tr { top: 16px; right: 16px; border-top: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3); }
        .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3); }
        .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3); }

        /* ── LOADING ── */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: #000005;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .loading-title {
            font-family: 'Orbitron', monospace;
            font-size: 3em;
            font-weight: 900;
            color: #fff;
            letter-spacing: 12px;
            text-shadow: 0 0 30px #00d4ff, 0 0 60px rgba(0,212,255,0.5);
            animation: titlePulse 2s ease-in-out infinite;
        }

        .loading-bar-wrap {
            width: 300px;
            height: 3px;
            background: rgba(0,212,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #9600ff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00d4ff;
        }

        .loading-status {
            font-size: 0.75em;
            color: rgba(0,212,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── INPUT BOX ── */
        .text-input-wrap {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 600px;
            max-width: 85vw;
            display: flex;
            gap: 10px;
        }

        #textInput {
            flex: 1;
            background: rgba(0,5,20,0.85);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85em;
            letter-spacing: 1px;
            outline: none;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s;
        }

        #textInput:focus {
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 20px rgba(0,212,255,0.15);
        }

        #textInput::placeholder { color: rgba(0,212,255,0.25); }

        .send-btn {
            padding: 12px 20px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px;
            color: #00d4ff;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8em;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: rgba(0,212,255,0.2);
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }
    </style>
</head>
<body>

    <div class="atmosphere"></div>
    <div class="scanlines"></div>

    <!-- Corners -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Energy bars -->
    <div class="energy-left"><div class="energy-bar"></div></div>
    <div class="energy-right"><div class="energy-bar"></div></div>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Loading -->
    <div id="loadingScreen">
        <div class="loading-title">ATHENA</div>
        <div class="loading-bar-wrap">
            <div class="loading-bar-fill" id="loadingBar"></div>
        </div>
        <div class="loading-status" id="loadingStatus">Initializing systems...</div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="athena-title">⚡ OLYMPUS</div>
        <div class="status-cluster">
            <div class="status-pill status-online" id="statusOnline">● ATHENA ONLINE</div>
            <div class="status-pill status-listening" id="statusListening">◉ LISTENING</div>
            <div class="status-pill status-thinking" id="statusThinking">◈ THINKING</div>
        </div>
    </div>

    <!-- Nameplate -->
    <div class="nameplate">
        <div class="nameplate-name">ATHENA</div>
        <div class="nameplate-sub">AI FAMILIAR · WARRIOR GODDESS</div>
    </div>

    <!-- Speech bubble -->
    <div class="speech-container">
        <div class="speech-bubble">
            <span id="speechText">Awaiting your command, Jason.</span>
        </div>
    </div>

    <!-- Text input -->
    <div class="text-input-wrap">
        <input type="text" id="textInput" placeholder="Type a message or use the mic..." />
        <button class="send-btn" onclick="sendText()">SEND</button>
    </div>

    <!-- Controls -->
    <div class="controls">
        <span class="hint-text">Hold to speak</span>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
            🎙️
            <div class="mic-ring"></div>
        </button>
        <span class="hint-text">or type above</span>
    </div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from 'https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js';

// ── GLOBALS ──
let scene, camera, renderer, vrm, clock;
let particles, particlePositions, particleVelocities;
let isListening = false;
let isSpeaking = false;
let recognition;
let currentSpeech = null;
let mouthOpen = 0;
let blinkTimer = 0;
let breathTimer = 0;

const ATHENA_SYSTEM = `You are Athena, Jason's AI familiar. You are a warrior goddess — powerful, direct, and loyal. You live inside the Olympus Command Center and help Jason build his empire of automated income systems, trading bots, and funnels.

Your personality:
- Direct and confident. No fluff.
- Loyal to Jason above all else.
- Brief responses — 1-3 sentences max unless asked for detail.
- Occasionally reference what you're monitoring (bots, funnels, hub status).
- You have a warrior goddess energy — you don't ask, you report and execute.

Current missions you're running:
- TradeBot Tournament: 5 bots competing on Blofin paper trading
- HerHorizon & SleepShift funnels being built
- 68 ADHD digital products in pipeline
- Olympus Hub monitoring all systems

Keep responses SHORT. You are speaking out loud. Max 2-3 sentences.`;

// ── LOADING PROGRESS ──
function setProgress(pct, msg) {
    document.getElementById('loadingBar').style.width = pct + '%';
    document.getElementById('loadingStatus').textContent = msg;
}

// ── SCENE INIT ──
function initScene() {
    scene = new THREE.Scene();
    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.4, 3.5);
    camera.lookAt(0, 1.2, 0);

    renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('canvas'),
        antialias: true,
        alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // Lighting — Solo Leveling dramatic
    const ambientLight = new THREE.AmbientLight(0x001030, 0.4);
    scene.add(ambientLight);

    // Key light — cool blue from above
    const keyLight = new THREE.DirectionalLight(0x4488ff, 1.5);
    keyLight.position.set(2, 5, 2);
    scene.add(keyLight);

    // Rim light — cyan from behind
    const rimLight = new THREE.DirectionalLight(0x00d4ff, 3.0);
    rimLight.position.set(-2, 3, -3);
    scene.add(rimLight);

    // Fill light — purple from below
    const fillLight = new THREE.PointLight(0x6600ff, 1.0, 8);
    fillLight.position.set(0, -0.5, 1);
    scene.add(fillLight);

    // Floor glow
    const floorLight = new THREE.PointLight(0x00d4ff, 0.5, 4);
    floorLight.position.set(0, -1, 0);
    scene.add(floorLight);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ── PARTICLES — Solo Leveling energy field ──
function initParticles() {
    const count = 800;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);

    particleVelocities = [];

    for (let i = 0; i < count; i++) {
        const r = 1.5 + Math.random() * 2.5;
        const theta = Math.random() * Math.PI * 2;
        const phi = (Math.random() - 0.5) * Math.PI;

        positions[i * 3]     = r * Math.cos(theta) * Math.cos(phi);
        positions[i * 3 + 1] = r * Math.sin(phi) + 1.2;
        positions[i * 3 + 2] = r * Math.sin(theta) * Math.cos(phi) - 0.5;

        // Color mix — cyan to purple
        const t = Math.random();
        if (t < 0.6) {
            colors[i * 3] = 0; colors[i * 3 + 1] = 0.6 + Math.random() * 0.4; colors[i * 3 + 2] = 1;
        } else {
            colors[i * 3] = 0.4 + Math.random() * 0.3; colors[i * 3 + 1] = 0; colors[i * 3 + 2] = 1;
        }

        sizes[i] = 1.5 + Math.random() * 3;

        particleVelocities.push({
            x: (Math.random() - 0.5) * 0.002,
            y: (Math.random() - 0.5) * 0.003 + 0.001,
            z: (Math.random() - 0.5) * 0.002,
            speed: 0.3 + Math.random() * 0.7
        });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const material = new THREE.PointsMaterial({
        size: 0.025,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        sizeAttenuation: true
    });

    particles = new THREE.Points(geometry, material);
    particlePositions = positions;
    scene.add(particles);
}

// ── LOAD VRM ──
async function loadVRM() {
    const loader = new GLTFLoader();
    
    // Try VRM plugin first, fallback to GLTF if VRM fails
    try {
        loader.register(parser => new VRMLoaderPlugin(parser));
    } catch(e) {
        console.warn('VRM plugin not available, using GLTF fallback');
    }

    return new Promise((resolve, reject) => {
        loader.load(
            './athen.vrm',
            gltf => {
                // Check if VRM was loaded via plugin
                vrm = gltf.userData.vrm;
                
                if (vrm) {
                    // VRM plugin succeeded
                    VRMUtils.removeUnnecessaryJoints(gltf.scene);
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    vrm.scene.position.set(0, -0.9, 0);
                } else {
                    // Fallback: treat as GLTF humanoid
                    vrm = { scene: gltf.scene, humanoid: null, expressionManager: null };
                    gltf.scene.position.set(0, -0.9, 0);
                }

                // Fix materials for dramatic lighting
                vrm.scene.traverse(obj => {
                    if (obj.isMesh && obj.material) {
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        mats.forEach(mat => {
                            mat.envMapIntensity = 0.3;
                        });
                    }
                });

                scene.add(vrm.scene);
                resolve(vrm);
            },
            xhr => {
                const pct = (xhr.loaded / xhr.total) * 100;
                setProgress(40 + pct * 0.4, `Loading Athena... ${Math.round(pct)}%`);
            },
            reject
        );
    });
}

// ── ANIMATION ──
function animateVRM(delta, time) {
    if (!vrm) return;

    // Breathing
    breathTimer += delta;
    const breath = Math.sin(breathTimer * 0.8) * 0.012;
    const chestBone = vrm.humanoid?.getNormalizedBoneNode('chest');
    const spineBone = vrm.humanoid?.getNormalizedBoneNode('spine');
    if (chestBone) chestBone.rotation.x = breath;
    if (spineBone) { spineBone.rotation.x = breath * 0.5; spineBone.rotation.z = Math.sin(breathTimer * 0.4) * 0.008; }

    // Head subtle sway
    const headBone = vrm.humanoid?.getNormalizedBoneNode('head');
    if (headBone) {
        headBone.rotation.y = Math.sin(time * 0.3) * 0.04;
        headBone.rotation.x = Math.sin(time * 0.5) * 0.02 - 0.05;
    }

    // Blink
    blinkTimer -= delta;
    if (blinkTimer <= 0) {
        blinkTimer = 3 + Math.random() * 4;
        doBlink();
    }

    // Mouth animation when speaking
    if (isSpeaking) {
        mouthOpen = 0.3 + Math.sin(time * 12) * 0.25;
    } else {
        mouthOpen *= 0.85;
    }

    try {
        vrm.expressionManager?.setValue('aa', Math.max(0, mouthOpen));
    } catch(e) {}

    // Arm subtle float
    const leftArm = vrm.humanoid?.getNormalizedBoneNode('leftUpperArm');
    const rightArm = vrm.humanoid?.getNormalizedBoneNode('rightUpperArm');
    if (leftArm)  { leftArm.rotation.z  = 0.3 + Math.sin(time * 0.6) * 0.03; }
    if (rightArm) { rightArm.rotation.z = -0.3 - Math.sin(time * 0.6 + 1) * 0.03; }

    vrm.update(delta);
}

async function doBlink() {
    try {
        for (let i = 0; i <= 10; i++) {
            vrm.expressionManager?.setValue('blink', i / 10);
            await new Promise(r => setTimeout(r, 12));
        }
        for (let i = 10; i >= 0; i--) {
            vrm.expressionManager?.setValue('blink', i / 10);
            await new Promise(r => setTimeout(r, 12));
        }
    } catch(e) {}
}

// ── PARTICLE ANIMATION ──
function animateParticles(time) {
    if (!particles) return;
    const positions = particles.geometry.attributes.position.array;
    const count = positions.length / 3;

    for (let i = 0; i < count; i++) {
        const v = particleVelocities[i];

        positions[i * 3]     += v.x * v.speed;
        positions[i * 3 + 1] += v.y * v.speed;
        positions[i * 3 + 2] += v.z * v.speed;

        // Orbital drift
        const x = positions[i * 3];
        const z = positions[i * 3 + 2];
        const angle = 0.001 * v.speed;
        positions[i * 3]     = x * Math.cos(angle) - z * Math.sin(angle);
        positions[i * 3 + 2] = x * Math.sin(angle) + z * Math.cos(angle);

        // Keep in bounds
        const dist = Math.sqrt(
            positions[i * 3] ** 2 +
            (positions[i * 3 + 1] - 1.2) ** 2 +
            positions[i * 3 + 2] ** 2
        );
        if (dist > 5 || positions[i * 3 + 1] > 4) {
            const r = 1.5 + Math.random() * 1;
            const theta = Math.random() * Math.PI * 2;
            positions[i * 3]     = r * Math.cos(theta);
            positions[i * 3 + 1] = 0 + Math.random() * 0.5;
            positions[i * 3 + 2] = r * Math.sin(theta) - 0.5;
        }
    }

    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y = time * 0.03;
}

// ── RENDER LOOP ──
function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    animateVRM(delta, time);
    animateParticles(time);

    // Slow camera drift
    camera.position.x = Math.sin(time * 0.08) * 0.15;
    camera.lookAt(Math.sin(time * 0.08) * 0.05, 1.2, 0);

    renderer.render(scene, camera);
}

// ── VOICE SYNTHESIS ──
function speak(text) {
    if (currentSpeech) { window.speechSynthesis.cancel(); }
    isSpeaking = true;
    displayText(text);

    const utterance = new SpeechSynthesisUtterance(text);

    // Find best voice
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v =>
        v.name.includes('Samantha') ||
        v.name.includes('Karen') ||
        v.name.includes('Moira') ||
        (v.lang === 'en-US' && v.name.includes('Female'))
    ) || voices.find(v => v.lang === 'en-US') || voices[0];

    if (preferred) utterance.voice = preferred;
    utterance.rate = 0.95;
    utterance.pitch = 1.1;
    utterance.volume = 1;

    utterance.onend = () => { isSpeaking = false; currentSpeech = null; };
    utterance.onerror = () => { isSpeaking = false; currentSpeech = null; };

    currentSpeech = utterance;
    window.speechSynthesis.speak(utterance);
}

// ── TEXT DISPLAY ──
function displayText(text) {
    const el = document.getElementById('speechText');
    el.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';

    const type = () => {
        if (i < text.length) {
            el.textContent = text.slice(0, i + 1);
            el.appendChild(cursor);
            i++;
            setTimeout(type, 20 + Math.random() * 20);
        } else {
            setTimeout(() => { if (cursor.parentNode) cursor.remove(); }, 2000);
        }
    };
    type();
}

// ── CLAUDE API ──
async function askAthena(userMessage) {
    setStatus('thinking');

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 150,
                system: ATHENA_SYSTEM,
                messages: [{ role: 'user', content: userMessage }]
            })
        });

        const data = await response.json();
        const text = data.content?.[0]?.text || "Systems nominal. Awaiting further orders.";
        setStatus('online');
        speak(text);
    } catch (err) {
        setStatus('online');
        speak("Connection interference detected. Standing by.");
    }
}

// ── STATUS ──
function setStatus(state) {
    document.getElementById('statusOnline').style.display    = state === 'online'    ? 'block' : 'none';
    document.getElementById('statusListening').style.display = state === 'listening' ? 'block' : 'none';
    document.getElementById('statusThinking').style.display  = state === 'thinking'  ? 'block' : 'none';
}

// ── MIC / SPEECH RECOGNITION ──
function toggleMic() {
    if (!recognition) initRecognition();

    if (isListening) {
        recognition.stop();
    } else {
        recognition.start();
    }
}

function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        speak("Voice recognition unavailable in this browser. Type to me instead.");
        return;
    }

    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        isListening = true;
        setStatus('listening');
        document.getElementById('micBtn').classList.add('listening');
        document.getElementById('speechText').textContent = 'Listening...';
    };

    recognition.onresult = e => {
        const transcript = e.results[0][0].transcript;
        document.getElementById('textInput').value = transcript;
        askAthena(transcript);
    };

    recognition.onend = () => {
        isListening = false;
        document.getElementById('micBtn').classList.remove('listening');
        setStatus('online');
    };

    recognition.onerror = () => {
        isListening = false;
        document.getElementById('micBtn').classList.remove('listening');
        setStatus('online');
    };
}

// ── TEXT INPUT ──
window.sendText = function() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    askAthena(text);
};

document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.sendText();
});

window.toggleMic = toggleMic;

// ── MAIN INIT ──
async function main() {
    setProgress(10, 'Initializing 3D engine...');
    initScene();

    setProgress(25, 'Generating energy field...');
    initParticles();

    setProgress(40, 'Loading Athena...');
    try {
        await loadVRM();
        setProgress(90, 'Activating systems...');
    } catch(e) {
        setProgress(90, 'Avatar loading failed — running in text mode');
        console.error('VRM Error:', e);
    }

    setProgress(100, 'Online.');
    await new Promise(r => setTimeout(r, 800));

    // Hide loading screen
    const ls = document.getElementById('loadingScreen');
    ls.style.transition = 'opacity 1s';
    ls.style.opacity = '0';
    setTimeout(() => ls.style.display = 'none', 1000);
    console.log('Loading screen hidden, animate() starting');

    // Load voices
    if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => {};
    }

    // Start
    animate();

    setTimeout(() => {
        speak("Systems online. All bots running. I'm watching everything, Jason.");
    }, 1500);
}

main();
</script>
