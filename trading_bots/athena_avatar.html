<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATHENA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000008;color:#00d4ff;font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 100%,rgba(80,0,180,0.2) 0%,transparent 70%);pointer-events:none}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.015) 2px,rgba(0,212,255,0.015) 4px);pointer-events:none}
.corner{position:fixed;width:50px;height:50px}
.tl{top:12px;left:12px;border-top:2px solid rgba(0,212,255,0.4);border-left:2px solid rgba(0,212,255,0.4)}
.tr{top:12px;right:12px;border-top:2px solid rgba(0,212,255,0.4);border-right:2px solid rgba(0,212,255,0.4)}
.bl{bottom:12px;left:12px;border-bottom:2px solid rgba(0,212,255,0.4);border-left:2px solid rgba(0,212,255,0.4)}
.br{bottom:12px;right:12px;border-bottom:2px solid rgba(0,212,255,0.4);border-right:2px solid rgba(0,212,255,0.4)}
.header{position:fixed;top:0;left:0;right:0;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,15,0.9) 0%,transparent 100%)}
.logo{font-family:'Orbitron',monospace;font-size:1.2em;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 20px #00d4ff}
.status{padding:5px 14px;border-radius:20px;font-size:0.65em;letter-spacing:2px;font-weight:700}
.online{background:rgba(0,255,157,0.1);border:1px solid rgba(0,255,157,0.4);color:#00ff9d}
.listening-st{background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.4);color:#ff6b00;display:none}
.thinking-st{background:rgba(150,0,255,0.1);border:1px solid rgba(150,0,255,0.4);color:#9600ff;display:none}
.avatar-wrap{position:relative;margin-bottom:32px}
.avatar-img{width:280px;height:360px;object-fit:cover;object-position:center top;border-radius:16px;border:2px solid rgba(0,212,255,0.3);box-shadow:0 0 60px rgba(0,212,255,0.2),0 0 120px rgba(80,0,180,0.15);display:block}
.avatar-glow{position:absolute;inset:-2px;border-radius:18px;background:linear-gradient(180deg,transparent 60%,rgba(0,5,20,0.8) 100%);pointer-events:none}
.eye-glow{position:absolute;top:28%;left:50%;transform:translateX(-50%);width:120px;height:20px;background:radial-gradient(ellipse,rgba(0,212,255,0.4) 0%,transparent 70%);animation:eyePulse 3s ease-in-out infinite;pointer-events:none}
@keyframes eyePulse{0%,100%{opacity:0.4}50%{opacity:0.9}}
.rim{position:absolute;inset:0;border-radius:16px;box-shadow:inset -3px 0 20px rgba(0,212,255,0.3),inset 3px 0 20px rgba(80,0,180,0.2);pointer-events:none}
.particles{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.8}90%{opacity:0.8}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
.name{font-family:'Orbitron',monospace;font-size:2em;font-weight:900;letter-spacing:10px;color:#fff;text-shadow:0 0 30px #00d4ff;margin-bottom:6px;text-align:center}
.subtitle{font-size:0.65em;color:rgba(0,212,255,0.45);letter-spacing:4px;margin-bottom:28px;text-align:center}
.speech{width:680px;max-width:90vw;background:rgba(0,5,20,0.85);border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:16px 24px;margin-bottom:20px;min-height:54px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(20px);position:relative}
.speech::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.5),transparent)}
#speechText{color:rgba(255,255,255,0.9);font-size:0.9em;line-height:1.6;text-align:center}
.cursor{display:inline-block;width:2px;height:1em;background:#00d4ff;margin-left:3px;animation:blink 0.8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.input-row{display:flex;gap:10px;width:580px;max-width:88vw;margin-bottom:20px}
#textInput{flex:1;background:rgba(0,5,20,0.85);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:11px 16px;color:#fff;font-family:'Share Tech Mono',monospace;font-size:0.82em;letter-spacing:1px;outline:none;backdrop-filter:blur(20px)}
#textInput:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 16px rgba(0,212,255,0.15)}
#textInput::placeholder{color:rgba(0,212,255,0.25)}
.send{padding:11px 18px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:8px;color:#00d4ff;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.75em;letter-spacing:2px;transition:all 0.2s}
.send:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 20px rgba(0,212,255,0.3)}
.mic-wrap{display:flex;align-items:center;gap:16px}
.hint{font-size:0.62em;color:rgba(0,212,255,0.3);letter-spacing:2px}
.mic{width:64px;height:64px;border-radius:50%;border:2px solid rgba(0,212,255,0.4);background:rgba(0,10,40,0.8);color:#00d4ff;cursor:pointer;font-size:1.6em;display:flex;align-items:center;justify-content:center;transition:all 0.3s;box-shadow:0 0 20px rgba(0,212,255,0.1);position:relative}
.mic:hover{border-color:rgba(0,212,255,0.8);box-shadow:0 0 40px rgba(0,212,255,0.4)}
.mic.active{border-color:rgba(255,107,0,0.8);box-shadow:0 0 40px rgba(255,107,0,0.5);animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 30px rgba(255,107,0,0.4)}50%{box-shadow:0 0 60px rgba(255,107,0,0.8)}}
.energy{position:fixed;top:15%;bottom:15%;width:3px;background:linear-gradient(180deg,transparent,rgba(0,212,255,0.4),transparent);overflow:hidden}
.energy.l{left:28px}
.energy.r{right:28px}
.energy::after{content:'';position:absolute;top:-30%;left:0;right:0;height:35%;background:linear-gradient(180deg,transparent,rgba(0,212,255,0.9),transparent);animation:energyFlow 3s ease-in-out infinite}
.energy.r::after{animation-delay:1.5s}
@keyframes energyFlow{0%{top:-35%}100%{top:110%}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="scanlines"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="energy l"></div>
<div class="energy r"></div>
<div class="particles" id="particles"></div>

<div class="header">
 <div class="logo">⚡ OLYMPUS</div>
 <div style="display:flex;gap:12px">
 <div class="status online" id="s1">● ATHENA ONLINE</div>
 <div class="status listening-st" id="s2">◉ LISTENING</div>
 <div class="status thinking-st" id="s3">◈ THINKING</div>
 </div>
</div>

<div class="avatar-wrap">
 <img class="avatar-img" src="./athena.jpg" onerror="this.style.display='none'" />
 <div class="avatar-glow"></div>
 <div class="eye-glow"></div>
 <div class="rim"></div>
</div>

<div class="name">ATHENA</div>
<div class="subtitle">AI FAMILIAR · WARRIOR GODDESS</div>

<div class="speech">
 <span id="speechText">Awaiting your command, Jason.</span>
</div>

<div class="input-row">
 <input id="textInput" type="text" placeholder="Type a message..." />
 <button class="send" onclick="send()">SEND</button>
</div>

<div class="mic-wrap">
 <span class="hint">speak</span>
 <button class="mic" id="micBtn" onclick="toggleMic()">🎙️</button>
 <span class="hint">or type</span>
</div>

<script>
// Particles
const pc = document.getElementById('particles');
for(let i=0;i<60;i++){
 const p=document.createElement('div');
 p.className='particle';
 const size=1+Math.random()*3;
 const cyan=Math.random()>0.4;
 p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${cyan?'rgba(0,212,255,0.7)':'rgba(120,0,255,0.7)'};animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*8}s;box-shadow:0 0 ${size*2}px ${cyan?'#00d4ff':'#7800ff'}`;
 pc.appendChild(p);
}

const API_KEY = 'YOUR_API_KEY_HERE';

const SYSTEM = 'You are Athena, Jason\'s AI familiar and warrior goddess. You live in the Olympus Command Center. Direct, loyal, powerful. Max 2 sentences. You monitor his trading bots, funnels, and income systems. Report status like a commander, not an assistant.';

let isSpeaking=false, isListening=false, recognition=null, currentUtterance=null;

function setStatus(s){
 document.getElementById('s1').style.display=s==='online'?'block':'none';
 document.getElementById('s2').style.display=s==='listening'?'block':'none';
 document.getElementById('s3').style.display=s==='thinking'?'block':'none';
}

function displayText(text){
 const el=document.getElementById('speechText');
 el.innerHTML='';
 let i=0;
 const cursor=document.createElement('span');
 cursor.className='cursor';
 const type=()=>{
 if(i<text.length){el.textContent=text.slice(0,i+1);el.appendChild(cursor);i++;setTimeout(type,18+Math.random()*18);}
 else setTimeout(()=>{if(cursor.parentNode)cursor.remove();},2500);
 };
 type();
}

function speak(text){
 if(currentUtterance)window.speechSynthesis.cancel();
 isSpeaking=true;
 displayText(text);
 const u=new SpeechSynthesisUtterance(text);
 const voices=window.speechSynthesis.getVoices();
 const v=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Moira'))||voices.find(v=>v.lang==='en-US')||voices[0];
 if(v)u.voice=v;
 u.rate=0.92;u.pitch=1.1;u.volume=1;
 u.onend=()=>{isSpeaking=false;currentUtterance=null;};
 u.onerror=()=>{isSpeaking=false;currentUtterance=null;};
 currentUtterance=u;
 window.speechSynthesis.speak(u);
}

async function askAthena(msg){
 setStatus('thinking');
 try{
 const r=await fetch('https://api.anthropic.com/v1/messages',{
 method:'POST',
 headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
 body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:120,system:SYSTEM,messages:[{role:'user',content:msg}]})
 });
 const d=await r.json();
 setStatus('online');
 speak(d.content?.[0]?.text||'Systems nominal.');
 }catch(e){
 setStatus('online');
 speak('Signal disrupted. Standing by.');
 }
}

window.send=function(){
 const inp=document.getElementById('textInput');
 const t=inp.value.trim();
 if(!t)return;
 inp.value='';
 askAthena(t);
};

document.getElementById('textInput').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

window.toggleMic=function(){
 if(!recognition){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){speak('Voice unavailable. Type to me.');return;}
 recognition=new SR();
 recognition.lang='en-US';
 recognition.onstart=()=>{isListening=true;setStatus('listening');document.getElementById('micBtn').classList.add('active');document.getElementById('speechText').textContent='Listening...';};
 recognition.onresult=e=>{askAthena(e.results[0][0].transcript);};
 recognition.onend=()=>{isListening=false;document.getElementById('micBtn').classList.remove('active');setStatus('online');};
 recognition.onerror=()=>{isListening=false;document.getElementById('micBtn').classList.remove('active');setStatus('online');};
 }
 isListening?recognition.stop():recognition.start();
};

// Init
window.speechSynthesis.onvoiceschanged=()=>{};
setTimeout(()=>speak("Systems online. All bots running. I'm watching everything, Jason."),800);
</script>
</body>
</html>
