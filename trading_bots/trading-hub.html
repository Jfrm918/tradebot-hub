<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olympus Command Center — LIVE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000510;
      color: #e0e0e0;
      font-family: 'Monaco', 'Courier New', monospace;
      overflow: hidden;
    }
    
    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 8px;
    }
    
    .header-title {
      font-size: 28px;
      font-weight: bold;
      color: #00d4ff;
      text-shadow: 0 0 10px rgba(0,212,255,0.5);
    }
    
    .header-time {
      color: #00d4ff;
      font-size: 14px;
    }
    
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      flex: 1;
      overflow-y: auto;
    }
    
    .bot-card {
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .bot-name {
      font-size: 16px;
      font-weight: bold;
      color: #00d4ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,212,255,0.2);
      border: 1px solid rgba(0,212,255,0.3);
    }
    
    .status-dot.active {
      background: #00ff9d;
      border-color: #00ff9d;
      box-shadow: 0 0 8px rgba(0,255,157,0.8);
    }
    
    .bot-stat {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #aaa;
    }
    
    .bot-stat-value {
      color: #00d4ff;
      font-weight: bold;
    }
    
    .bot-stat-value.positive {
      color: #00ff9d;
    }
    
    .bot-stat-value.negative {
      color: #ff5555;
    }
    
    .refresh-time {
      font-size: 10px;
      color: #666;
      margin-top: 8px;
    }
    
    .summary {
      padding: 15px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
    }
    
    .summary-item {
      text-align: center;
    }
    
    .summary-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    
    .summary-value {
      font-size: 18px;
      font-weight: bold;
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title">⚡ OLYMPUS LIVE</div>
      <div class="header-time" id="time">--:--:--</div>
    </div>
    
    <div class="summary" id="summary">
      <div class="summary-item">
        <div class="summary-label">Cycle</div>
        <div class="summary-value" id="cycle">—</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Active Bots</div>
        <div class="summary-value" id="activeBots">0/7</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Total Trades</div>
        <div class="summary-value" id="totalTrades">0</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Total PnL</div>
        <div class="summary-value" id="totalPnl">$0.00</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Portfolio</div>
        <div class="summary-value" id="portfolio">$700.00</div>
      </div>
    </div>
    
    <div class="content" id="bots">
      <div style="text-align:center;padding:40px;color:#666;">Loading bots...</div>
    </div>
  </div>

  <script>
    const BOT_NAMES = ['momentum', 'reversion', 'grid', 'scalp', 'swing', 'vwap_rev', 'vwap_mom'];
    const BOT_DISPLAY = {
      'momentum': 'Momentum',
      'reversion': 'Mean Reversion',
      'grid': 'Grid',
      'scalp': 'Scalp',
      'swing': 'Swing',
      'vwap_rev': 'VWAP Rev',
      'vwap_mom': 'VWAP Mom'
    };

    // Update time every second
    setInterval(() => {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString();
    }, 1000);

    // CORE: Fetch and display snapshot every 2 seconds (AGGRESSIVE)
    async function updateSnapshot() {
      try {
        const response = await fetch('./snapshot.json?t=' + Date.now(), {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
        });
        const data = await response.json();
        
        // Update cycle
        document.getElementById('cycle').textContent = `#${data.cycle}`;
        
        // Calculate summary
        let activeBots = 0;
        let totalTrades = 0;
        let totalPnl = 0.0;
        
        BOT_NAMES.forEach(name => {
          const bot = data.bots[name];
          if (bot.trades > 0) activeBots++;
          totalTrades += bot.trades || 0;
          totalPnl += bot.pnl || 0.0;
        });
        
        document.getElementById('activeBots').textContent = `${activeBots}/7`;
        document.getElementById('totalTrades').textContent = totalTrades;
        const pnlEl = document.getElementById('totalPnl');
        pnlEl.textContent = `$${totalPnl.toFixed(4)}`;
        pnlEl.className = 'summary-value ' + (totalPnl >= 0 ? 'positive' : 'negative');
        
        // Render bot cards
        const botsDiv = document.getElementById('bots');
        botsDiv.innerHTML = '';
        
        BOT_NAMES.forEach(name => {
          const bot = data.bots[name];
          const card = document.createElement('div');
          card.className = 'bot-card';
          
          const statusDot = bot.trades > 0 ? 'status-dot active' : 'status-dot';
          const pnlClass = bot.pnl >= 0 ? 'bot-stat-value positive' : 'bot-stat-value negative';
          
          card.innerHTML = `
            <div class="bot-name">
              <div class="${statusDot}"></div>
              ${BOT_DISPLAY[name]}
            </div>
            <div class="bot-stat">
              <span>Trades:</span>
              <span class="bot-stat-value">${bot.trades}</span>
            </div>
            <div class="bot-stat">
              <span>Wins:</span>
              <span class="bot-stat-value">${bot.wins}</span>
            </div>
            <div class="bot-stat">
              <span>Win Rate:</span>
              <span class="bot-stat-value">${bot.trades > 0 ? ((bot.wins / bot.trades) * 100).toFixed(1) : '—'}%</span>
            </div>
            <div class="bot-stat">
              <span>PnL:</span>
              <span class="${pnlClass}">$${bot.pnl.toFixed(4)}</span>
            </div>
            <div class="bot-stat">
              <span>Balance:</span>
              <span class="bot-stat-value">$${bot.balance.toFixed(2)}</span>
            </div>
            <div class="refresh-time">Last: ${new Date(data.last_updated).toLocaleTimeString()}</div>
          `;
          
          botsDiv.appendChild(card);
        });
        
      } catch (err) {
        console.error('Snapshot fetch failed:', err);
      }
    }

    // INITIAL LOAD
    updateSnapshot();
    
    // CONTINUOUS UPDATE: Every 2 seconds, NO CACHE
    setInterval(updateSnapshot, 2000);
  </script>
</body>
</html>
