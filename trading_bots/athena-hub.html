<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athena Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000510;
      color: #e0e0e0;
      font-family: 'Monaco', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(200,150,255,0.08);
      border: 2px solid rgba(200,150,255,0.3);
      border-radius: 12px;
    }
    .title {
      font-size: 32px;
      font-weight: bold;
      color: #d4a4ff;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(212,164,255,0.5);
    }
    .subtitle {
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🦉 ATHENA HUB</div>
    <div class="subtitle">AI Familiar Dashboard<br/>Credits • Tasks • Status</div>
  </div>
</body>
</html>
