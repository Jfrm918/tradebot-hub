<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeBot Tournament</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000510;
            color: #e0e8ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #8899aa;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-dot.live {
            background: #00ff9d;
        }

        .metrics-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: rgba(0, 212, 255, 0.04);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
        }

        .metric-label {
            font-size: 10px;
            color: #445566;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
        }

        .metric-value.positive {
            color: #00ff9d;
        }

        .metric-value.negative {
            color: #ff6b00;
        }

        .section-title {
            font-size: 10px;
            color: #334455;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin: 24px 0 16px 0;
        }

        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .bot-card {
            background: rgba(0, 5, 16, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .bot-card.inactive {
            opacity: 0.4;
            border-color: rgba(255, 255, 255, 0.06);
        }

        .bot-card:hover {
            border-color: rgba(0, 212, 255, 0.4);
        }

        .bot-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            border: 2px solid;
        }

        .bot-avatar.momentum {
            background: rgba(255, 107, 53, 0.2);
            border-color: #FF6B35;
            color: #FF6B35;
        }

        .bot-avatar.mean_reversion {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .bot-avatar.grid {
            background: rgba(155, 89, 182, 0.2);
            border-color: #9b59b6;
            color: #9b59b6;
        }

        .bot-avatar.scalping {
            background: rgba(243, 156, 18, 0.2);
            border-color: #f39c12;
            color: #f39c12;
        }

        .bot-avatar.swing {
            background: rgba(0, 255, 157, 0.2);
            border-color: #00ff9d;
            color: #00ff9d;
        }

        .bot-avatar.vwap_reversion {
            background: rgba(231, 76, 60, 0.2);
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .bot-avatar.vwap_momentum {
            background: rgba(26, 188, 156, 0.2);
            border-color: #1abc9c;
            color: #1abc9c;
        }

        .bot-info {
            flex: 1;
        }

        .bot-name {
            font-size: 14px;
            font-weight: 600;
            color: #e0e8ff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bot-rank {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .bot-status {
            font-size: 10px;
            color: #445566;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 4px 0 0 0;
        }

        .bot-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
        }

        .bot-row:last-child {
            border-bottom: none;
        }

        .bot-label {
            color: #5577aa;
            font-size: 11px;
        }

        .bot-value {
            font-weight: 500;
            color: #c0d8f0;
        }

        .bot-value.positive {
            color: #00ff9d;
        }

        .bot-value.negative {
            color: #ff6b00;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8899aa;
        }

        .error {
            background: rgba(255, 50, 50, 0.06);
            border: 1px solid rgba(255, 50, 50, 0.2);
            border-radius: 8px;
            margin: 16px 0;
            padding: 16px;
            color: #ff8888;
            font-size: 12px;
        }

        footer {
            text-align: center;
            color: #223344;
            font-size: 11px;
            padding: 20px 0;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TradeBot Tournament</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <div id="content">
            <div class="loading">Loading tournament data...</div>
        </div>

        <footer>
            Last updated: <span id="lastUpdate">—</span> · Auto-refresh every 30s
        </footer>
    </div>

    <script>
        const SNAPSHOT_URL = "https://raw.githubusercontent.com/Jfrm918/tradebot-hub/main/trading_bots/snapshot.json";
        const POLL_INTERVAL = 30000;

        const BOT_COLORS = {
            momentum: { name: "Momentum", abbr: "M", color: "#FF6B35" },
            mean_reversion: { name: "Mean Reversion", abbr: "MR", color: "#00d4ff" },
            grid: { name: "Grid", abbr: "G", color: "#9b59b6" },
            scalping: { name: "Scalping", abbr: "SC", color: "#f39c12" },
            swing: { name: "Swing", abbr: "SW", color: "#00ff9d" },
            vwap_reversion: { name: "VWAP Rev", abbr: "VR", color: "#e74c3c" },
            vwap_momentum: { name: "VWAP Mom", abbr: "VM", color: "#1abc9c" },
        };

        function formatMoney(n) {
            if (n === null || isNaN(n)) return "—";
            return "$" + Number(n).toFixed(2);
        }

        function formatPercent(n) {
            if (n === null || isNaN(n)) return "—";
            return (n >= 0 ? "+" : "") + Number(n).toFixed(2) + "%";
        }

        function timeAgo(iso) {
            if (!iso) return "—";
            const s = Math.floor((Date.now() - new Date(iso)) / 1000);
            if (s < 60) return s + "s ago";
            if (s < 3600) return Math.floor(s / 60) + "m ago";
            return Math.floor(s / 3600) + "h ago";
        }

        async function fetchData() {
            try {
                const response = await fetch(SNAPSHOT_URL + "?t=" + Date.now());
                if (!response.ok) throw new Error("HTTP " + response.status);
                const data = await response.json();
                render(data);
                document.getElementById("statusDot").className = "status-dot live";
                document.getElementById("statusText").textContent = "LIVE";
            } catch (e) {
                document.getElementById("statusDot").className = "status-dot";
                document.getElementById("statusText").textContent = "OFFLINE";
                document.getElementById("content").innerHTML = `<div class="error">Connection failed: ${e.message}</div>`;
            }
        }

        function render(data) {
            const { tournament_day, summary, bots = [] } = data;
            const ranked = [...bots].sort((a, b) => (a.rank ?? 99) - (b.rank ?? 99));

            let html = `
                <div class="metrics-bar">
                    <div class="metric-card">
                        <div class="metric-label">Tournament Day</div>
                        <div class="metric-value">${tournament_day} / 14</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Active Bots</div>
                        <div class="metric-value">${summary.active_bots || 0} / 7</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Total Equity</div>
                        <div class="metric-value">${formatMoney(summary.total_equity)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Total P&L</div>
                        <div class="metric-value ${summary.total_pnl >= 0 ? 'positive' : 'negative'}">${formatMoney(summary.total_pnl)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Total Trades</div>
                        <div class="metric-value">${summary.total_trades || 0}</div>
                    </div>
                </div>

                <div class="section-title">Leaderboard</div>
                <div class="bots-grid">
            `;

            ranked.forEach(bot => {
                const meta = BOT_COLORS[bot.id] || { name: bot.id, abbr: "??", color: "#8899aa" };
                const pnlPct = bot.equity ? ((bot.equity - 100) / 100 * 100) : 0;
                const isActive = bot.status === "ACTIVE";

                html += `
                    <div class="bot-card ${isActive ? '' : 'inactive'}">
                        <div class="bot-header">
                            <div class="bot-avatar ${bot.id}">${meta.abbr}</div>
                            <div class="bot-info">
                                <p class="bot-name">
                                    ${meta.name}
                                    <span class="bot-rank">#${bot.rank}</span>
                                </p>
                                <p class="bot-status">${bot.status}</p>
                            </div>
                        </div>
                        <div class="bot-row">
                            <span class="bot-label">P&L</span>
                            <span class="bot-value ${bot.pnl >= 0 ? 'positive' : 'negative'}">${formatMoney(bot.pnl)}</span>
                        </div>
                        <div class="bot-row">
                            <span class="bot-label">Return</span>
                            <span class="bot-value ${pnlPct >= 0 ? 'positive' : 'negative'}">${formatPercent(pnlPct)}</span>
                        </div>
                        <div class="bot-row">
                            <span class="bot-label">Equity</span>
                            <span class="bot-value">${formatMoney(bot.equity)}</span>
                        </div>
                        <div class="bot-row">
                            <span class="bot-label">Trades</span>
                            <span class="bot-value">${bot.trades || 0}</span>
                        </div>
                        <div class="bot-row">
                            <span class="bot-label">Win Rate</span>
                            <span class="bot-value">${bot.win_rate ? Number(bot.win_rate * 100).toFixed(1) + "%" : "—"}</span>
                        </div>
                        <div class="bot-row">
                            <span class="bot-label">Heartbeat</span>
                            <span class="bot-value">${timeAgo(bot.last_heartbeat)}</span>
                        </div>
                    </div>
                `;
            });

            html += `
                </div>
            `;

            document.getElementById("content").innerHTML = html;
            document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
        }

        // Initial fetch
        fetchData();

        // Poll every 30 seconds
        setInterval(fetchData, POLL_INTERVAL);
    </script>
</body>
</html>
